<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word, Line & Character Counter</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/tools.css">
    <link rel="stylesheet" href="styles/word-letter-count.css">
</head>
<body class="tool-body">
    <header class="tool-header">
        <a href="/" class="back-btn" aria-label="Back to hub">&#8592; <span class="back-label">Hub</span></a>
        <h1 class="tool-title">Word, Line & Character Counter</h1>
        <p class="tool-subtitle">Paste or type your text to count words, characters, and lines.</p>
    </header>

    <main class="tool-main">
        <textarea id="textInput" class="tool-textarea" placeholder="Type or paste your text here..."></textarea>

        <div class="options">
            <label><input type="checkbox" id="includeSpaces"> Include spaces in character count</label>
            <label><input type="checkbox" id="includeLineJumps"> Include line breaks in character count</label>
            <label><input type="checkbox" id="separateByHyphen"> Count hyphen-separated parts as separate words</label>
        </div>

        <div class="results">
            <div class="result-item">
                <span class="result-value" id="wordCount">0</span>
                <span class="result-label">Words</span>
            </div>
            <div class="result-item">
                <span class="result-value" id="charCount">0</span>
                <span class="result-label">Characters</span>
            </div>
            <div class="result-item">
                <span class="result-value" id="lineCount">0</span>
                <span class="result-label">Lines</span>
            </div>
        </div>
    </main>

    <footer class="tool-footer">
        <p class="tool-footer-text">&copy; 2024 –<script>document.write(new Date().getFullYear());</script> Çağan Efe Çalıdağ (<a href="https://cagancalidag.com" target="_blank" rel="noopener">cagancalidag.com</a>). All rights reserved.</p>
    </footer>

    <script src="./js/script.js"></script>
</body>
</html>
