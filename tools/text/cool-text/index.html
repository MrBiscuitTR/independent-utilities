<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Text Generator</title>
    <link rel="icon" href="/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/tools.css">
    <link rel="stylesheet" href="styles/cool-text.css">
</head>
<body class="tool-body">
    <header class="tool-header">
        <a href="/" class="back-btn" aria-label="Back to hub">&#8592; <span class="back-label">Hub</span></a>
        <h1 class="tool-title">Cool Text Generator</h1>
        <p class="tool-subtitle">Transform your text into stylized Unicode variations — all copy-pasteable.</p>
    </header>

    <main class="tool-main ct-main">

        <div class="form-group">
            <label class="tool-label" for="ctInput">Your text</label>
            <input type="text" id="ctInput" class="tool-input" placeholder="Type something cool…" autocomplete="off" spellcheck="false" maxlength="200">
        </div>

        <div id="ctResults" class="ct-results">
            <p class="ct-placeholder">Type above to see transformations.</p>
        </div>

    </main>

    <footer class="tool-footer">
        <p class="tool-footer-text">&copy; 2024 –<script>document.write(new Date().getFullYear());</script> Çağan Efe Çalıdağ (<a href="https://cagancalidag.com" target="_blank" rel="noopener">cagancalidag.com</a>). All rights reserved.</p>
    </footer>

    <script src="js/cool-text.js"></script>
</body>
</html>
