<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping & Traceroute</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/tools.css">
    <link rel="stylesheet" href="styles/ping-traceroute.css">
</head>
<body class="tool-body">
    <header class="tool-header">
        <a href="/" class="back-btn" aria-label="Back to hub">&#8592; <span class="back-label">Hub</span></a>
        <h1 class="tool-title">Ping & Traceroute</h1>
        <p class="tool-subtitle">Ping a host or trace the route from your server. Requires local backend.</p>
    </header>

    <main class="tool-main pt-main">

        <div id="backendBanner" class="backend-banner hidden">
            ⚠️ Local backend offline — run <code>python app.py</code> in the <code>python/</code> folder.
        </div>

        <div class="input-row">
            <input type="text" id="hostInput" class="tool-input" placeholder="example.com or 1.2.3.4" autocomplete="off" spellcheck="false">
            <select id="modeSelect" class="tool-select mode-sel">
                <option value="ping">Ping</option>
                <option value="traceroute">Traceroute</option>
            </select>
        </div>

        <div id="pingOpts" class="ping-opts">
            <label class="tool-label opt-label">Ping count:
                <select id="pingCount" class="tool-select cnt-sel">
                    <option value="4" selected>4</option>
                    <option value="8">8</option>
                    <option value="10">10</option>
                </select>
            </label>
        </div>

        <button class="tool-button" id="runBtn">Run</button>

        <div id="resultArea"></div>

    </main>

    <footer class="tool-footer">
        <p class="tool-footer-text">&copy; 2024 –<script>document.write(new Date().getFullYear());</script> Çağan Efe Çalıdağ (<a href="https://cagancalidag.com" target="_blank" rel="noopener">cagancalidag.com</a>). All rights reserved.</p>
    </footer>

    <script src="js/ping-traceroute.js"></script>
</body>
</html>
