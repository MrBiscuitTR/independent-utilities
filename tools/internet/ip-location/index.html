<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Location Lookup</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/tools.css">
    <link rel="stylesheet" href="styles/ip-location.css">
</head>
<body class="tool-body">
    <header class="tool-header">
        <a href="/" class="back-btn" aria-label="Back to hub">&#8592; <span class="back-label">Hub</span></a>
        <h1 class="tool-title">IP Location Lookup</h1>
        <p class="tool-subtitle">Geolocation, ISP, and ASN info for any public IP address.</p>
    </header>

    <main class="tool-main iploc-main">

        <div id="backendBanner" class="backend-banner hidden">
            ⚠️ Local backend offline — run <code>python app.py</code> in the <code>python/</code> folder.
        </div>

        <div class="input-row">
            <input type="text" id="ipInput" class="tool-input" placeholder="8.8.8.8 or 2001:4860:4860::8888" autocomplete="off" spellcheck="false">
            <button class="tool-button" id="lookupBtn">Lookup</button>
        </div>
        <p class="hint-text">Leave blank to look up your own IP.</p>

        <div id="resultArea"></div>

    </main>

    <footer class="tool-footer">
        <p class="tool-footer-text">&copy; 2024 –<script>document.write(new Date().getFullYear());</script> Çağan Efe Çalıdağ (<a href="https://cagancalidag.com" target="_blank" rel="noopener">cagancalidag.com</a>). All rights reserved.</p>
    </footer>

    <script src="js/ip-location.js"></script>
</body>
</html>
