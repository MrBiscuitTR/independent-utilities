<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Lookup</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/tools.css">
    <link rel="stylesheet" href="styles/dns-lookup.css">
</head>
<body class="tool-body">
    <header class="tool-header">
        <a href="/" class="back-btn" aria-label="Back to hub">&#8592; <span class="back-label">Hub</span></a>
        <h1 class="tool-title">DNS Lookup</h1>
        <p class="tool-subtitle">Query DNS records via DNS-over-HTTPS — no server required.</p>
    </header>

    <main class="tool-main dns-main">

        <div class="input-row">
            <input type="text" id="domainInput" class="tool-input" placeholder="example.com" autocomplete="off" spellcheck="false">
            <select id="typeSelect" class="tool-select type-sel">
                <option value="A">A</option>
                <option value="AAAA">AAAA</option>
                <option value="MX">MX</option>
                <option value="NS">NS</option>
                <option value="TXT">TXT</option>
                <option value="CNAME">CNAME</option>
                <option value="SOA">SOA</option>
                <option value="PTR">PTR</option>
                <option value="ALL">ALL common</option>
            </select>
            <button class="tool-button" id="lookupBtn">Lookup</button>
        </div>

        <div class="doh-row">
            <span class="doh-label">DoH resolver:</span>
            <label><input type="radio" name="doh" value="cloudflare" checked> Cloudflare</label>
            <label><input type="radio" name="doh" value="google"> Google</label>
        </div>

        <div id="resultArea"></div>

    </main>

    <footer class="tool-footer">
        <p class="tool-footer-text">&copy; 2024–<script>document.write(new Date().getFullYear());</script> Çağan Efe Çalıdağ (<a href="https://cagancalidag.com" target="_blank" rel="noopener">cagancalidag.com</a>). All rights reserved.</p>
    </footer>

    <script src="js/dns-lookup.js"></script>
</body>
</html>
